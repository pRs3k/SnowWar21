// Use this file to configure your DEDICATED server. 
// This config file is executed everytime the server changes levels.

// disable autoaim
sv_aim 0

// player bounding boxes (collisions, not clipping)
sv_clienttrace 3.5

// disable clients' ability to pause the server
pausable 0

// default server name. Change to "Bob's Server", etc.
hostname "Snow-War 2.1"

// maximum client movement speed (with snowshoes)
sv_maxspeed 330

// normal maximum client movement speed (without snowshoes)
sv_normalspeed 250

// Speed reduction when carrying a flag
mp_flagslowdown 30

// 50 minute timelimit
mp_timelimit 50

//disable cheats
sv_cheats 0

// Crosshairs: ON
crosshair 1

// Badword punishment: Cencor message

mp_badwordpunish 1

// Allow custom player models not listed in playermodels.txt: OFF

mp_custommodels 0

// Respawn time

mp_respawntime 5

